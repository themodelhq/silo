# Netlify deployment config for the PayEnvelope PWA.
# Deploy: push this repo to GitHub, then in Netlify choose "Add new site" ->
# "Import an existing project", pick the repo, and Netlify will read this
# file automatically (no manual build settings needed).
#
# Docs: https://docs.netlify.com/configure-builds/file-based-configuration/

[build]
  base = "frontend"
  publish = "."
  command = ""

# Service workers must never be served from cache, or installed clients can
# get stuck on a stale version indefinitely (the browser only checks for a
# new sw.js when it re-fetches this exact file with normal HTTP caching).
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "public, max-age=3600"
    Content-Type = "application/manifest+json"

# Icons and other static assets are safe to cache aggressively since their
# filenames don't change between deploys.
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# PayEnvelope's own navigation is handled client-side within index.html (no
# path-based routes), but this keeps any direct/deep link from 404ing.
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
