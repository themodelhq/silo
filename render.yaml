# Render Blueprint for PayEnvelope backend.
# Deploy: push this repo to GitHub, then in Render dashboard choose
# "New +" -> "Blueprint" and point it at the repo. Render reads this file
# from the repo root and provisions everything below automatically.
#
# Docs: https://render.com/docs/blueprint-spec
#
# Free-tier notes:
#  - The free web service spins down after 15 minutes of inactivity (the
#    first request after that takes ~30-60s to wake it back up).
#  - The free Postgres database is deleted after a limited window (Render
#    has changed this window over time — check render.com/pricing). For
#    anything beyond testing, switch both plan fields below to a paid tier.

databases:
  - name: payenvelope-db
    plan: free
    databaseName: payenvelope
    user: payenvelope

services:
  - type: web
    name: payenvelope-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: DATABASE_URL
        fromDatabase:
          name: payenvelope-db
          property: connectionString
      - key: JWT_SECRET_KEY
        generateValue: true
      # Set this to your deployed Netlify URL once you have it, e.g.
      #   https://payenvelope.netlify.app
      # Comma-separate multiple origins (custom domain + Netlify subdomain).
      # Left as "*" until you set it, which is fine for testing but not
      # for production (see backend/README.md).
      - key: ALLOWED_ORIGINS
        value: "*"

